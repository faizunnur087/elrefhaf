---
- name: Deploy Spring Boot application in Docker
  hosts: all
  become: yes

  vars:
    app_dir: /opt/app
    app_port: 8080
    app_container_name: spring-app
    java_version: "21"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - nginx
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset SSH connection so group change takes effect
      meta: reset_connection

    - name: Install local DB if requested
      block:
        - name: Install PostgreSQL
          apt:
            name:
              - postgresql
              - postgresql-contrib
              - python3-psycopg2
            state: present
            update_cache: yes

        - name: Start and enable PostgreSQL
          service:
            name: postgresql
            state: started
            enabled: yes

        - name: Find pg_hba.conf
          shell: find /etc/postgresql -name pg_hba.conf | head -1
          register: pg_hba_path
          changed_when: false

        - name: Fix SCRAM auth to md5 in pg_hba.conf
          shell: "sed -i 's/scram-sha-256/md5/g' {{ pg_hba_path.stdout }}"
          when: pg_hba_path.stdout != ""

        - name: Reload PostgreSQL after pg_hba change
          service:
            name: postgresql
            state: reloaded

        - name: Create database
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};"

        - name: Create database user
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER {{ db_username }} WITH ENCRYPTED PASSWORD '{{ db_password }}';"

        - name: Grant all privileges to user
          shell: |
            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};"
      when: install_db is defined and install_db == 'true'

    - name: Wipe old app directory to prevent stale files
      file:
        path: "{{ app_dir }}"
        state: absent
      ignore_errors: yes

    - name: Recreate app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Create jar subdirectory in app directory
      file:
        path: "{{ app_dir }}/jar"
        state: directory
        mode: "0755"

    - name: Copy JAR to server
      copy:
        src: "jar/{{ jar_name }}"
        dest: "{{ app_dir }}/jar/{{ jar_name }}"
        mode: "0644"

    - name: Copy Dockerfile to server
      copy:
        src: Dockerfile
        dest: "{{ app_dir }}/Dockerfile"
        mode: "0644"

    - name: Verify JAR was copied
      stat:
        path: "{{ app_dir }}/jar/{{ jar_name }}"
      register: jar_stat

    - name: Fail if JAR is missing
      fail:
        msg: "JAR not found at {{ app_dir }}/jar/{{ jar_name }} — copy step may have failed. jar_name={{ jar_name }}"
      when: not jar_stat.stat.exists

    - name: Stop existing container
      shell: docker stop {{ app_container_name }} || true

    - name: Remove existing container
      shell: docker rm {{ app_container_name }} || true

    - name: Remove old image to force rebuild
      shell: docker rmi {{ app_container_name }}:latest || true

    - name: Build Docker image
      shell: docker build --no-cache -t {{ app_container_name }}:latest {{ app_dir }}

    - name: Run Docker container
      shell: >
        docker run -d
        --name {{ app_container_name }}
        --network host
        --restart always
        -e SERVER_PORT={{ app_port }}
        -e SPRING_DATASOURCE_URL='{{ spring_datasource_url | default('') }}'
        -e SPRING_DATASOURCE_USERNAME='{{ spring_datasource_username | default('') }}'
        -e SPRING_DATASOURCE_PASSWORD='{{ spring_datasource_password | default('') }}'
        -e SPRING_DATA_MONGODB_URI='{{ spring_data_mongodb_uri | default('') }}'
        -e SPRING_PROFILES_ACTIVE='{{ spring_profiles_active | default('production') }}'
        {{ app_container_name }}:latest

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;
              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 60s;
                  proxy_read_timeout 60s;
              }
          }

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
        force: yes

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes

    - name: Wait for Spring Boot to start
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        delay: 15
        timeout: 120
        state: started
      ignore_errors: yes
      register: port_wait

    - name: Capture Docker logs if startup failed
      command: docker logs --tail 100 {{ app_container_name }}
      register: service_logs
      when: port_wait is failed
      changed_when: false
      ignore_errors: yes

    - name: Show Docker logs
      debug:
        msg: "{{ service_logs.stdout_lines | default(service_logs.stderr_lines) }}"
      when: port_wait is failed

    - name: Fail with clear message if app did not start
      fail:
        msg: "Spring Boot did not start on port {{ app_port }}. See docker logs output above."
      when: port_wait is failed

    - name: Report server IP
      debug:
        msg: "server_ip={{ ansible_host }}"

    - name: Verify container is running
      shell: >
        docker ps --filter name={{ app_container_name }}
        --filter status=running
        --format '{{ '{{' }}.Names{{ '}}' }}'
      register: container_check
      retries: 3
      delay: 5
      until: container_check.stdout != ""
      become: yes

    - name: Report deployment success
      debug:
        msg: "Spring Boot deployed successfully. Live at http://{{ ansible_host }}/"